name: todo_list_challenge
description: "Una aplicación móvil construida con Flutter que implementa una
  lista de tareas intuitiva y funcional."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.7.2

isar_version: &isar_version 3.1.8 # define the version to be used

dependencies:
  alert_info: ^0.0.3
  analyzer: ^6.9.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  formz: ^0.8.0
  go_router: ^15.1.2
  intl: ^0.20.2
  # isar: ^3.1.0+1
  # isar_flutter_libs: ^3.1.0+1
  isar:
    version: *isar_version
    hosted: https://pub.isar-community.dev/
  isar_flutter_libs: # contains Isar Core
    version: *isar_version
    hosted: https://pub.isar-community.dev/
  path_provider: ^2.1.5
  uuid: ^4.5.1

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.14
  coverage: ^1.14.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  isar_generator:
    version: 3.1.8
    hosted: https://pub.isar-community.dev/
  mockito: ^5.4.4
  test: ^1.25.15

flutter:
  uses-material-design: true
